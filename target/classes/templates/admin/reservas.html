<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Reservations | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1">Reservations</h1>
            <p class="text-secondary mb-0">Review booking details and update their status.</p>
        </div>
        <a th:href="@{/admin}" class="btn btn-outline-light">Back to Dashboard</a>
    </div>

    <div th:if="${adminExito}" class="alert alert-success" th:text="${adminExito}"></div>

    <div class="card bg-black border-secondary text-white">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-dark table-striped align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Email</th>
                        <th>Motorcycle</th>
                        <th>Dates</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Created</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="reserva : ${reservas}">
                        <td th:text="${reserva.nombreCliente}">Customer</td>
                        <td th:text="${reserva.email}">email@example.com</td>
                        <td th:text="${reserva.motocicleta != null ? reserva.motocicleta.nombre : 'N/A'}">Motorcycle</td>
                        <td>
                            <div th:text="${reserva.fechaInicio} + ' - ' + reserva.fechaFin">2026-01-01 - 2026-01-03</div>
                        </td>
                        <td th:text="${reserva.total}">0</td>
                        <td>
                            <form th:action="@{/admin/reservas/{id}/estado(id=${reserva.id})}" method="post" class="d-flex gap-2">
                                <select name="estado" class="form-select form-select-sm bg-dark text-white border-secondary">
                                    <option value="PENDIENTE" th:selected="${reserva.estado == 'PENDIENTE'}">PENDIENTE</option>
                                    <option value="CONFIRMADA" th:selected="${reserva.estado == 'CONFIRMADA'}">CONFIRMADA</option>
                                    <option value="CANCELADA" th:selected="${reserva.estado == 'CANCELADA'}">CANCELADA</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-danger">Save</button>
                            </form>
                        </td>
                        <td th:text="${reserva.fechaCreacion != null ? reserva.fechaCreacion : 'N/A'}">2026-01-01T10:00</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reservas)}">
                        <td colspan="7" class="text-center text-secondary">No reservations found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
