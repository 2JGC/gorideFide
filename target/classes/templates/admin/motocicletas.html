<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Fleet | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1">Fleet Management</h1>
            <p class="text-secondary mb-0">Edit motorcycle details, availability and photo.</p>
        </div>
        <a th:href="@{/admin}" class="btn btn-outline-light">Back to Dashboard</a>
    </div>

    <div th:if="${adminExito}" class="alert alert-success" th:text="${adminExito}"></div>
    <div th:if="${adminError}" class="alert alert-danger" th:text="${adminError}"></div>

    <div class="row g-4">
        <div class="col-12" th:each="moto : ${motocicletas}">
            <div class="card bg-black border-secondary text-white">
                <div class="card-body">
                    <form th:action="@{/admin/motocicletas/{id}(id=${moto.id})}"
                          method="post"
                          enctype="multipart/form-data">
                        <div class="row g-3 align-items-start">

                            <!-- Imagen actual + campo para cambiarla -->
                            <div class="col-md-2 text-center">
                                <img th:src="${moto.imagen}" alt="Foto moto"
                                     class="img-fluid rounded mb-2"
                                     style="max-height:120px; object-fit:cover;">
                                <label class="form-label small text-secondary d-block">Change photo</label>
                                <input type="file" name="imagen" accept="image/*"
                                       class="form-control form-control-sm bg-dark text-white border-secondary">
                            </div>

                            <!-- Nombre y precio -->
                            <div class="col-md-2">
                                <div class="fw-bold mb-2" th:text="${moto.nombre}">Motorcycle</div>
                                <div class="text-secondary">$<span th:text="${moto.precioPorDia}">0</span>/day</div>
                            </div>

                            <!-- DescripciÃ³n -->
                            <div class="col-md-6">
                                <label class="form-label">Description</label>
                                <textarea name="descripcion"
                                          class="form-control bg-dark text-white border-secondary"
                                          rows="3"
                                          th:text="${moto.descripcion}"></textarea>
                            </div>

                            <!-- Disponibilidad y botÃ³n -->
                            <div class="col-md-2">
                                <label class="form-label d-block">Availability</label>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox"
                                           name="disponible" value="true"
                                           th:checked="${moto.disponible}">
                                    <label class="form-check-label">Available</label>
                                </div>
                                <button type="submit" class="btn btn-danger w-100">Update</button>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
