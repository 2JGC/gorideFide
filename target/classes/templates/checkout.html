<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Checkout | Go Ride Moto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="row g-4">

        <!-- BOOKING SUMMARY -->
        <div class="col-lg-4">

            <div class="card bg-dark text-white border-secondary p-4">

                <h4 class="mb-3">Booking Summary</h4>

                <p>
                    <strong>Motorcycle:</strong>
                    <span th:text="${reserva.motocicleta.nombre}"></span>
                </p>

                <p>
                    <strong>Start:</strong>
                    <span th:text="${reserva.fechaInicio}"></span>
                </p>

                <p>
                    <strong>End:</strong>
                    <span th:text="${reserva.fechaFin}"></span>
                </p>

                <p>
                    <strong>Days:</strong>
                    <span th:text="${reserva.dias}"></span>
                </p>

                <hr>

                <p class="fs-5">
                    <strong>Total:</strong>
                    $<span th:text="${reserva.total}"></span>
                </p>

            </div>

        </div>


        <!-- FORM -->
        <div class="col-lg-8">

            <form th:action="@{/checkout/confirm}"
                  method="post"
                  th:object="${reserva}">

                <!-- Hidden data to keep reservation -->
                <input type="hidden" name="motocicletaId"
                       th:value="${reserva.motocicleta.id}">

                <input type="hidden" th:field="*{fechaInicio}">
                <input type="hidden" th:field="*{fechaFin}">
                <input type="hidden" th:field="*{dias}">
                <input type="hidden" th:field="*{total}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Name</label>
                        <input type="text"
                               th:field="*{nombreCliente}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Phone</label>
                        <input type="text"
                               th:field="*{telefono}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Number of Persons</label>
                        <input type="number"
                               th:field="*{numeroPersonas}"
                               class="form-control"
                               min="1"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Address</label>
                        <input type="text"
                               th:field="*{direccion}"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>City</label>
                        <input type="text"
                               th:field="*{ciudad}"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Country</label>
                        <input type="text"
                               th:field="*{pais}"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Province</label>
                        <input type="text"
                               th:field="*{provincia}"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Postal Code</label>
                        <input type="text"
                               th:field="*{codigoPostal}"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Notes</label>
                        <input type="text"
                               th:field="*{notas}"
                               class="form-control">
                    </div>

                </div>

                <div class="form-check my-3">

                    <input class="form-check-input"
                           type="checkbox"
                           th:field="*{aceptaTerminos}"
                           required>

                    <label class="form-check-label">
                        I accept the terms of service
                    </label>

                </div>

                <button type="submit"
                        class="btn btn-danger btn-lg">
                    Confirm Reservation
                </button>

            </form>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
