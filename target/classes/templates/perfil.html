<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{perfil.title}">My Profile | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0A0505; color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
        .perfil-card { background: #1A0D0D; border: 1px solid #3A2727; border-radius: 20px; padding: 40px; max-width: 600px; margin: 60px auto; }
        .perfil-title { font-size: 28px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .perfil-subtitle { color: #94A3B8; margin-bottom: 32px; font-size: 14px; }
        .form-label { color: #E2E8F0; font-size: 14px; font-weight: 500; }
        .form-control { background: rgba(34,16,16,0.5); border: 1px solid rgba(242,13,13,0.2); color: #fff; height: 52px; border-radius: 8px; }
        .form-control:focus { background: rgba(34,16,16,0.7); border-color: #8A0000; color: #fff; box-shadow: none; }
        .form-control:disabled { background: rgba(20,10,10,0.5); color: #64748B; }
        .btn-save { background: #8A0000; border: none; color: #fff; font-weight: 700; text-transform: uppercase; height: 52px; border-radius: 8px; width: 100%; margin-top: 8px; }
        .btn-save:hover { background: #a00000; color: #fff; }
        .btn-historial { background: transparent; border: 1px solid #3A2727; color: #fff; font-weight: 600; text-transform: uppercase; font-size: 13px; border-radius: 8px; padding: 10px 24px; }
        .btn-historial:hover { border-color: #8A0000; color: #fff; }
        .alert-exito { background: rgba(0,200,0,0.1); border: 1px solid rgba(0,200,0,0.3); color: #d1fae5; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
        .rol-badge { display: inline-block; background: #8A0000; color: #fff; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 4px 12px; border-radius: 20px; margin-bottom: 24px; }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div class="perfil-card">
        <h1 class="perfil-title" th:text="#{perfil.title}">My Profile</h1>
        <p class="perfil-subtitle">Manage your account information</p>

        <div th:if="${exito}" class="alert-exito" th:text="${exito}"></div>

        <div class="rol-badge" th:text="${usuario.rol != null ? usuario.rol : 'USER'}">USER</div>

        <form th:action="@{/perfil}" method="post">
            <div class="mb-3">
                <label class="form-label" th:text="#{perfil.nombre}">Full Name</label>
                <input type="text" name="nombre" class="form-control"
                       th:value="${usuario.nombre}"
                       placeholder="Your full name">
            </div>
            <div class="mb-4">
                <label class="form-label" th:text="#{perfil.email}">Email</label>
                <input type="email" class="form-control"
                       th:value="${usuario.email}"
                       disabled>
                <small class="text-secondary">Email cannot be changed.</small>
            </div>
            <button type="submit" class="btn-save" th:text="#{perfil.save}">Save Changes</button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/perfil/historial}" class="btn-historial" th:text="#{perfil.historial}">
                View My Reservations
            </a>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
