<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            min-height:100vh;
            background:#111;
            font-family:'Space Grotesk', sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }

        .card-box{
            width:100%;
            max-width:500px;
            background:#221010;
            border:1px solid rgba(242,13,13,0.2);
            border-radius:12px;
            padding:40px;
            color:#fff;
        }

        .title{
            font-size:32px;
            font-weight:700;
            text-transform:uppercase;
            margin-bottom:10px;
        }

        .subtitle{
            color:#94A3B8;
            margin-bottom:28px;
        }

        .form-control{
            background:rgba(34,16,16,0.5);
            border:1px solid rgba(242,13,13,0.2);
            color:#fff;
            height:52px;
        }

        .form-control::placeholder{
            color:#64748B;
        }

        .form-label{
            color:#E2E8F0;
            margin-bottom:8px;
        }

        .btn-main{
            width:100%;
            height:54px;
            border:none;
            border-radius:8px;
            background:#8A0000;
            color:#fff;
            font-weight:700;
            text-transform:uppercase;
            margin-top:10px;
        }

        .msg-error{
            background:rgba(255,0,0,0.15);
            border:1px solid rgba(255,0,0,0.3);
            color:#fecaca;
            padding:12px;
            border-radius:8px;
            margin-bottom:16px;
        }

        .back-link{
            display:inline-block;
            margin-top:18px;
            color:#CBD5E1;
        }
    </style>
</head>
<body>

<div class="card-box">
    <div class="title">Create Account</div>
    <div class="subtitle">Join Go Ride Moto and get ready for your next adventure.</div>

    <div th:if="${errorRegistro}" class="msg-error" th:text="${errorRegistro}"></div>

    <form th:action="@{/register}" method="post" th:object="${usuario}">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" placeholder="you@example.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn-main">Sign Up</button>
    </form>

    <a th:href="@{/login}" class="back-link">Already have an account? Log in</a>
</div>

</body>
</html>
