<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#221010;
            --bg-soft:rgba(34,16,16,0.5);
            --red:#8A0000;
            --red-bright:#F20D0D;
            --border:rgba(242,13,13,0.2);
            --white:#FFFFFF;
            --text-soft:#94A3B8;
            --text-muted:#64748B;
            --text-light:#CBD5E1;
        }

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            min-height:100vh;
            background:#111;
            font-family:'Space Grotesk', sans-serif;
        }

        a{
            text-decoration:none;
        }

        .login-overlay{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            background:rgba(0,0,0,0.65);
        }

        .login-modal-custom{
            position:relative;
            width:500px;
            min-height:724px;
            background:var(--bg);
            border:1px solid rgba(242,13,13,0.2);
            box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
            border-radius:12px;
            overflow:hidden;
            display:flex;
            flex-direction:column;
        }

        .login-close{
            position:absolute;
            right:17px;
            top:17px;
            width:24px;
            height:24px;
            border:none;
            background:transparent;
            color:var(--text-soft);
            font-size:22px;
            line-height:1;
            z-index:5;
            cursor:pointer;
        }

        .login-body{
            padding:48px;
            display:flex;
            flex-direction:column;
            flex:1;
        }

        .login-title{
            margin:44px 0 0 0;
            font-size:36px;
            line-height:45px;
            font-weight:700;
            letter-spacing:-0.9px;
            text-transform:uppercase;
            color:var(--white);
        }

        .login-subtitle{
            margin:12px 0 0 0;
            font-size:14px;
            line-height:21px;
            font-weight:400;
            color:var(--text-soft);
        }

        .login-form{
            margin-top:59px;
            display:flex;
            flex-direction:column;
            gap:24px;
        }

        .login-field{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .login-label-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
        }

        .login-label{
            margin:0;
            font-size:14px;
            line-height:21px;
            font-weight:500;
            color:#E2E8F0;
        }

        .forgot-link{
            font-size:12px;
            line-height:16px;
            font-weight:500;
            color:var(--red-bright);
        }

        .input-wrap{
            position:relative;
        }

        .login-input{
            width:100%;
            height:57px;
            background:var(--bg-soft);
            border:1px solid var(--border);
            border-radius:8px;
            color:var(--white);
            font-size:16px;
            line-height:20px;
            outline:none;
            box-shadow:none;
        }

        .login-input::placeholder{
            color:var(--text-muted);
            opacity:1;
        }

        .input-email{
            padding:17px 16px 18px 48px;
        }

        .input-password{
            padding:17px 48px 18px 48px;
        }

        .input-icon-left{
            position:absolute;
            left:18px;
            top:50%;
            transform:translateY(-50%);
            width:20px;
            height:20px;
            color:var(--text-soft);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            pointer-events:none;
        }

        .input-icon-right{
            position:absolute;
            right:16px;
            top:50%;
            transform:translateY(-50%);
            width:22px;
            height:22px;
            border:none;
            background:transparent;
            color:var(--text-soft);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            cursor:pointer;
        }

        .login-action{
            margin-top:40px;
        }

        .login-btn{
            width:100%;
            height:56px;
            border:none;
            border-radius:8px;
            background:var(--red);
            color:var(--white);
            font-size:16px;
            line-height:24px;
            font-weight:700;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            box-shadow:0 10px 15px -3px rgba(242,13,13,0.2), 0 4px 6px -4px rgba(242,13,13,0.2);
            text-transform:uppercase;
        }

        .signup-row{
            margin-top:32px;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:4px;
            flex-wrap:wrap;
            text-align:center;
        }

        .signup-text{
            font-size:14px;
            line-height:20px;
            font-weight:400;
            color:var(--text-soft);
        }

        .signup-link{
            font-size:14px;
            line-height:20px;
            font-weight:700;
            color:var(--white);
            text-decoration:underline;
        }

        .divider-wrap{
            margin:32px 0;
            position:relative;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .divider-line{
            width:100%;
            height:1px;
            background:rgba(242,13,13,0.1);
        }

        .divider-text{
            position:absolute;
            padding:0 16px;
            background:var(--bg);
            font-size:12px;
            line-height:16px;
            font-weight:500;
            text-transform:uppercase;
            color:var(--text-muted);
        }

        .social-row{
            display:flex;
            gap:16px;
        }

        .social-btn{
            flex:1;
            height:46px;
            border:1px solid var(--border);
            border-radius:8px;
            background:transparent;
            color:var(--text-light);
            font-size:14px;
            line-height:20px;
            font-weight:500;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
        }

        .social-icon{
            width:20px;
            height:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            color:var(--text-light);
        }

        .login-footer-glow{
            margin-top:auto;
            width:100%;
            height:4px;
            background:linear-gradient(90deg, rgba(242,13,13,0) 0%, #F20D0D 50%, rgba(242,13,13,0) 100%);
            opacity:0.5;
        }

        .error-box{
            margin-top:20px;
            padding:12px 14px;
            border-radius:8px;
            background:rgba(255,0,0,0.12);
            border:1px solid rgba(255,0,0,0.3);
            color:#fecaca;
            font-size:14px;
        }

        .logout-box{
            margin-top:20px;
            padding:12px 14px;
            border-radius:8px;
            background:rgba(0,128,0,0.14);
            border:1px solid rgba(0,128,0,0.3);
            color:#d1fae5;
            font-size:14px;
        }

        @media (max-width: 576px){
            .login-modal-custom{
                width:100%;
                min-height:auto;
            }

            .login-body{
                padding:28px;
            }

            .social-row{
                flex-direction:column;
            }

            .login-title{
                font-size:30px;
                line-height:38px;
            }
        }
    </style>
</head>
<body>

<div class="login-overlay">
    <div class="login-modal-custom">

        <a th:href="@{/}" class="login-close" aria-label="Close">✕</a>

        <div class="login-body">
            <h1 class="login-title">LOG IN</h1>
            <p class="login-subtitle">Welcome back, rider. Ready for your next journey?</p>

            <div th:if="${param.error}" class="error-box">
                Invalid email or password.
            </div>

            <div th:if="${param.logout}" class="logout-box">
                You have logged out successfully.
            </div>

            <form class="login-form" th:action="@{/login}" method="post">
                <div class="login-field">
                    <label class="login-label" for="email">Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon-left">✉</span>
                        <input
                            id="email"
                            name="email"
                            type="email"
                            class="login-input input-email"
                            placeholder="rider@example.com"
                            required>
                    </div>
                </div>

                <div class="login-field">
                    <div class="login-label-row">
                        <label class="login-label" for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <div class="input-wrap">
                        <span class="input-icon-left">🔒</span>
                        <input
                            id="password"
                            name="password"
                            type="password"
                            class="login-input input-password"
                            placeholder="••••••••"
                            required>
                        <button type="button" class="input-icon-right" id="togglePassword" aria-label="Show password">👁</button>
                    </div>
                </div>

                <div class="login-action">
                    <button type="submit" class="login-btn">
                        <span>REV ENGINE &amp; LOG IN</span>
                        <span>❯</span>
                    </button>
                </div>
            </form>

            <div class="signup-row">
                <span class="signup-text">Don’t have an account?</span>
               <a th:href="@{/register}" class="signup-link">Sign Up</a>
            </div>

            <div class="divider-wrap">
                <div class="divider-line"></div>
                <div class="divider-text">OR CONTINUE WITH</div>
            </div>

            <div class="social-row">
                <button type="button" class="social-btn">
                    <span class="social-icon">G</span>
                    <span>Google</span>
                </button>

                <button type="button" class="social-btn">
                    <span class="social-icon">f</span>
                    <span>Facebook</span>
                </button>
            </div>
        </div>

        <div class="login-footer-glow"></div>
    </div>
</div>

<script>
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', function () {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁';
            }
        });
    }
</script>

</body>
</html>
