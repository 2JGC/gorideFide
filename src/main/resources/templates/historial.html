<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{historial.title}">My Reservations | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0A0505; color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
        .page-header { padding: 60px 0 30px; }
        .page-title { font-size: 36px; font-weight: 700; text-transform: uppercase; }
        .page-sub { color: #94A3B8; font-size: 14px; }
        .reserva-card { background: #1A0D0D; border: 1px solid #3A2727; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .moto-nombre { font-size: 18px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .moto-img { width: 90px; height: 70px; object-fit: cover; border-radius: 10px; border: 1px solid #3A2727; }
        .dato-label { color: #94A3B8; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .dato-valor { font-size: 15px; font-weight: 500; }
        .total-valor { font-size: 20px; font-weight: 700; color: #8A0000; }
        .badge-pendiente { background: rgba(234,179,8,0.2); color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-confirmada { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-cancelada { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .empty-box { background: #1A0D0D; border: 1px dashed #3A2727; border-radius: 16px; padding: 60px; text-align: center; color: #64748B; }
        .btn-back { border: 1px solid #3A2727; color: #fff; border-radius: 8px; padding: 10px 24px; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .btn-back:hover { border-color: #8A0000; color: #fff; }
        .btn-book { background: #8A0000; border: none; color: #fff; border-radius: 8px; padding: 10px 24px; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .btn-book:hover { background: #a00000; color: #fff; }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div class="page-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title" th:text="#{historial.title}">My Reservations</h1>
                <p class="page-sub">Your complete booking history</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/perfil}" class="btn btn-back">← Back to Profile</a>
                <a th:href="@{/book-now}" class="btn btn-book" th:text="#{historial.booknow}">Book Now</a>
            </div>
        </div>
    </div>

    <!-- Sin reservas -->
    <div th:if="${#lists.isEmpty(reservas)}" class="empty-box">
        <p class="fs-5 mb-3" th:text="#{historial.empty}">You have no reservations yet.</p>
        <a th:href="@{/book-now}" class="btn btn-book" th:text="#{historial.booknow}">Book Now</a>
    </div>

    <!-- Lista de reservas -->
    <div th:each="reserva : ${reservas}" class="reserva-card">
        <div class="row align-items-center g-3">

            <!-- Imagen moto -->
            <div class="col-auto">
                <img th:if="${reserva.motocicleta != null}"
                     th:src="${reserva.motocicleta.imagen}"
                     class="moto-img" alt="Moto">
            </div>

            <!-- Nombre moto y fechas -->
            <div class="col">
                <div class="moto-nombre"
                     th:text="${reserva.motocicleta != null ? reserva.motocicleta.nombre : 'N/A'}">
                    Motorcycle
                </div>
                <div class="text-secondary small">
                    <span th:text="${reserva.fechaInicio}">2026-01-01</span>
                    →
                    <span th:text="${reserva.fechaFin}">2026-01-05</span>
                    &nbsp;·&nbsp;
                    <span th:text="${reserva.dias}">4</span> days
                </div>
            </div>

            <!-- Total -->
            <div class="col-auto text-center">
                <div class="dato-label" th:text="#{historial.total}">Total</div>
                <div class="total-valor">$<span th:text="${reserva.total}">0</span></div>
            </div>

            <!-- Estado -->
            <div class="col-auto text-center">
                <div class="dato-label mb-1" th:text="#{historial.status}">Status</div>
                <span th:if="${reserva.estado == 'PENDIENTE'}" class="badge-pendiente">PENDIENTE</span>
                <span th:if="${reserva.estado == 'CONFIRMADA'}" class="badge-confirmada">CONFIRMADA</span>
                <span th:if="${reserva.estado == 'CANCELADA'}" class="badge-cancelada">CANCELADA</span>
                <span th:if="${reserva.estado == null}" class="badge-pendiente">—</span>
            </div>

            <!-- Fecha creación -->
            <div class="col-auto text-end">
                <div class="dato-label" th:text="#{historial.created}">Created</div>
                <div class="dato-valor small text-secondary"
                     th:text="${#temporals.format(reserva.fechaCreacion, 'dd/MM/yyyy')}">
                    01/01/2026
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
