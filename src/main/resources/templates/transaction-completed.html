<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Go Ride Moto | Home</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }

            body{
                background:#0A0505;
                font-family:'Space Grotesk', sans-serif;
                color:#fff;
            }

            a{
                text-decoration:none;
                color:inherit;
            }

            .home-page{
                width:100%;
                background:#0A0505;
            }

            .navbar-custom{
                background:#0A0505;
                min-height:73px;
                border-bottom:1px solid #1a1111;
            }

            .brand-logo{
                width:130px;
                height:53px;
                background:#1a0d0d;
                border:1px solid #3A2727;
                border-radius:6px;
                display:flex;
                align-items:center;
                justify-content:center;
                font-weight:700;
                font-size:13px;
                text-transform:uppercase;
                letter-spacing:1px;
                color:#fff;
            }

            .nav-link-custom{
                font-weight:700;
                font-size:11px;
                line-height:16px;
                letter-spacing:2.4px;
                text-transform:uppercase;
                color:#fff;
                position:relative;
                padding:0.8rem 1rem;
            }

            .nav-link-custom.active::after{
                content:"";
                position:absolute;
                left:50%;
                transform:translateX(-50%);
                bottom:-6px;
                width:80px;
                height:1px;
                background:#fff;
            }

            .lang-box{
                width:80px;
                height:37px;
                border:1px solid #3A2727;
                border-radius:15px;
                background:#0A0505;
                display:flex;
                align-items:center;
                justify-content:center;
                gap:8px;
                font-size:11px;
                font-weight:700;
                letter-spacing:2px;
                text-transform:uppercase;
            }

            .lang-dot{
                width:10px;
                height:10px;
                border:2px solid #D9D9D9;
                border-radius:50%;
                display:inline-block;
            }

            .user-btn{
                width:39px;
                height:38px;
                border-radius:10px;
                background:#8A0000;
                display:flex;
                align-items:center;
                justify-content:center;
                color:#fff;
                font-size:14px;
            }

            .hero{
                min-height:1080px;
                position:relative;
                background:
                    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
                    url('/img/home-hero.jpg');
                background-size:cover;
                background-position:center;
                display:flex;
                align-items:flex-start;
            }

            .hero::before{
                content:"";
                position:absolute;
                inset:0;
                background:linear-gradient(90deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.35) 35%, rgba(0,0,0,0.25) 100%);
            }

            .hero-placeholder-note{
                position:absolute;
                right:40px;
                bottom:40px;
                background:rgba(26,13,13,0.85);
                border:1px dashed #3A2727;
                padding:12px 18px;
                border-radius:10px;
                font-size:12px;
                color:#94A3B8;
                z-index:2;
            }

            .hero-content{
                position:relative;
                z-index:2;
                padding-top:330px;
                padding-left:30px;
                max-width:900px;
            }

            .hero-title{
                font-size:56px;
                font-weight:700;
                line-height:1.05;
                text-transform:uppercase;
                margin-bottom:18px;
            }

            .hero-title .accent{
                color:#C11414;
            }

            .hero-subtitle{
                font-size:15px;
                font-weight:300;
                line-height:24px;
                margin-bottom:28px;
                color:#fff;
            }

            .hero-actions{
                display:flex;
                gap:16px;
                flex-wrap:wrap;
            }

            .btn-primary-custom{
                background:#8A0000;
                border:none;
                border-radius:8px;
                color:#fff;
                padding:16px 40px;
                font-size:16px;
                font-weight:700;
                letter-spacing:1.6px;
                text-transform:uppercase;
            }

            .btn-secondary-custom{
                background:rgba(255,255,255,0.05);
                border:1px solid rgba(255,255,255,0.2);
                backdrop-filter:blur(2px);
                border-radius:8px;
                color:#fff;
                padding:16px 40px;
                font-size:16px;
                font-weight:700;
                letter-spacing:1.6px;
                text-transform:uppercase;
            }

            .services-section{
                background:#1A0D0D;
                border-top:1px solid #3A2727;
                border-bottom:1px solid #3A2727;
                padding:110px 0 95px;
            }

            .icon-box{
                width:88px;
                height:89px;
                margin:0 auto 28px;
                background:#2D0F0F;
                border:1px solid rgba(58,39,39,0.5);
                border-radius:15px;
                display:flex;
                align-items:center;
                justify-content:center;
                color:#8A0000;
                font-size:28px;
                font-weight:700;
            }

            .service-title{
                font-size:16px;
                font-weight:700;
                line-height:24px;
                letter-spacing:1.6px;
                text-transform:uppercase;
                margin-bottom:18px;
            }

            .service-desc{
                max-width:180px;
                margin:0 auto;
                font-size:13px;
                font-weight:300;
                line-height:24px;
                text-align:center;
                color:#94A3B8;
            }

            .fleet-section{
                padding:110px 0 60px;
                background:#0A0505;
            }

            .fleet-title{
                font-size:56px;
                font-weight:700;
                line-height:1;
                text-transform:uppercase;
            }

            .fleet-title .accent{
                color:#8A0000;
            }

            .fleet-text{
                color:#94A3B8;
                font-size:15px;
                font-weight:300;
                line-height:24px;
            }

            .bikes-grid{
                padding:50px 0 80px;
            }

            .bike-card{
                background:#1A0D0D;
                border:1px solid #3A2727;
                border-radius:15px;
                overflow:hidden;
                height:100%;
                color:#fff;
            }

            .bike-image{
                height:260px;
                background:#2a1616;
                border-bottom:1px solid #3A2727;
                display:flex;
                align-items:center;
                justify-content:center;
                color:#94A3B8;
                font-size:14px;
                text-transform:uppercase;
                letter-spacing:1px;
                overflow:hidden;
            }

            .bike-image img{
                width:100%;
                height:100%;
                object-fit:cover;
                display:block;
            }

            .bike-body{
                padding:14px 16px 18px;
            }

            .bike-name{
                font-size:12px;
                font-weight:700;
                line-height:40px;
                text-transform:uppercase;
                margin-bottom:0;
            }

            .bike-desc{
                font-size:10px;
                font-weight:300;
                line-height:20px;
                color:#fff;
                min-height:92px;
                margin-bottom:14px;
            }

            .bike-divider{
                border-top:1px solid #3A2727;
                margin:10px 0 14px;
            }

            .bike-footer{
                display:flex;
                justify-content:space-between;
                align-items:center;
                gap:12px;
            }

            .bike-price{
                font-size:12px;
                font-weight:700;
                line-height:40px;
                text-transform:uppercase;
                color:#8A0000;
                margin:0;
            }

            .bike-book-btn{
                width:77px;
                height:31px;
                border-radius:15px;
                border:1px solid #3A2727;
                background:#2D0F0F;
                color:#fff;
                font-size:10px;
                font-weight:700;
                text-transform:uppercase;
                display:flex;
                align-items:center;
                justify-content:center;
            }

            .experience-section{
                padding:40px 0 140px;
            }

            .experience-card{
                background:#1A0D0D;
                border:1px solid #3A2727;
                border-radius:40px;
                min-height:275px;
                padding:42px 28px;
                text-align:center;
                height:100%;
            }

            .experience-icon{
                width:42px;
                height:42px;
                margin:0 auto 22px;
                border-radius:50%;
                display:flex;
                align-items:center;
                justify-content:center;
                color:#8A0000;
                font-size:22px;
                font-weight:700;
            }

            .experience-title{
                font-size:15px;
                font-weight:700;
                line-height:40px;
                text-transform:uppercase;
                margin-bottom:8px;
            }

            .experience-desc{
                font-size:10px;
                font-weight:300;
                line-height:30px;
                color:#94A3B8;
                text-transform:capitalize;
                max-width:250px;
                margin:0 auto;
            }

            .footer{
                background:#1A0D0D;
                border-top:1px solid #3A2727;
                border-bottom:1px solid #3A2727;
                padding:84px 0 30px;
            }

            .footer-logo{
                width:235px;
                height:109px;
                background:#2D0F0F;
                border:1px solid #3A2727;
                border-radius:8px;
                display:flex;
                align-items:center;
                justify-content:center;
                text-align:center;
                font-size:18px;
                font-weight:700;
                text-transform:uppercase;
                margin-bottom:28px;
            }

            .footer-social{
                display:flex;
                gap:24px;
                align-items:center;
            }

            .footer-social a{
                color:#8A0000;
                font-size:20px;
                font-weight:700;
            }

            .footer-heading{
                color:#8A0000;
                font-size:11px;
                font-weight:700;
                line-height:40px;
                letter-spacing:1px;
                text-transform:uppercase;
                margin-bottom:10px;
            }

            .footer-links a,
            .footer-text{
                display:block;
                color:#fff;
                font-size:11px;
                font-weight:700;
                line-height:40px;
                letter-spacing:1px;
                text-transform:uppercase;
            }

            .footer-bottom{
                margin-top:50px;
                border-top:3px solid #3A2727;
                padding-top:28px;
                text-align:center;
                color:#9E9E9E;
                font-size:11px;
                font-weight:700;
                line-height:40px;
                letter-spacing:1px;
                text-transform:uppercase;
            }

            @media (max-width: 1199px){
                .fleet-title{
                    font-size:46px;
                    margin-bottom:24px;
                }

                .hero-title{
                    font-size:46px;
                }
            }

            @media (max-width: 991px){
                .hero{
                    min-height:760px;
                }

                .hero-content{
                    padding-top:220px;
                    padding-left:20px;
                    padding-right:20px;
                }

                .hero-title{
                    font-size:38px;
                }

                .fleet-title{
                    font-size:38px;
                }

                .nav-link-custom.active::after{
                    display:none;
                }
            }

            @media (max-width: 767px){
                .hero{
                    min-height:680px;
                }

                .hero-title{
                    font-size:30px;
                }

                .fleet-title{
                    font-size:32px;
                }

                .hero-actions{
                    flex-direction:column;
                    align-items:flex-start;
                }

                .btn-primary-custom,
                .btn-secondary-custom{
                    width:100%;
                    max-width:280px;
                    text-align:center;
                }

                .footer-logo{
                    margin-left:auto;
                    margin-right:auto;
                }

                .footer-social{
                    justify-content:center;
                    margin-bottom:30px;
                }
            }
        </style>
    </head>

    <body class="bg-dark text-white">

        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="container py-5 text-center">

            <h1 class="mb-4 text-success">
                Reservation Completed
            </h1>

            <p class="lead">
                Your motorcycle reservation has been successfully created.
            </p>

            <p>
                Thank you for choosing <strong>Go Ride Moto</strong>.
            </p>

            <a th:href="@{/}" class="btn btn-danger mt-4">
                Back to Home
            </a>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </body>
</html>
