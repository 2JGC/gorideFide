<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #111;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
        }
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0,0,0,0.65);
        }
        .auth-box {
            width: 500px;
            max-width: 100%;
            background: #221010;
            border: 1px solid rgba(242,13,13,0.2);
            border-radius: 8px;
            padding: 44px;
        }
        .auth-title {
            font-size: 34px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .auth-text {
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-control {
            height: 54px;
            background: rgba(34,16,16,0.5);
            border: 1px solid rgba(242,13,13,0.2);
            color: #fff;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(34,16,16,0.75);
            border-color: #F20D0D;
            color: #fff;
            box-shadow: none;
        }
        .btn-red {
            width: 100%;
            height: 54px;
            border: 0;
            border-radius: 8px;
            background: #8A0000;
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
        }
        .message-error {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            background: rgba(255,0,0,0.12);
            border: 1px solid rgba(255,0,0,0.3);
            color: #fecaca;
            font-size: 14px;
        }
    </style>
</head>
<body>
<main class="auth-wrap">
    <section class="auth-box">
        <h1 class="auth-title">New Password</h1>
        <p class="auth-text">Choose a new password with at least 6 characters.</p>

        <div th:if="${error}" class="message-error" th:text="${error}"></div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div class="mb-3">
                <label for="password" class="form-label">New Password</label>
                <input id="password" name="password" type="password" class="form-control" minlength="6" required>
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" minlength="6" required>
            </div>
            <button type="submit" class="btn-red">Update Password</button>
        </form>
    </section>
</main>
</body>
</html>
