<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Messages | Go Ride Moto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1">Contact Messages</h1>
            <p class="text-secondary mb-0">Messages submitted from Contact Us.</p>
        </div>
        <a th:href="@{/admin}" class="btn btn-outline-light">Back to Dashboard</a>
    </div>

    <div class="card bg-black border-secondary text-white">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-dark table-striped align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Subject</th>
                        <th>Message</th>
                        <th>Sent At</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="mensaje : ${mensajes}">
                        <td th:text="${mensaje.nombre}">Name</td>
                        <td th:text="${mensaje.email}">email@example.com</td>
                        <td th:text="${mensaje.asunto}">Subject</td>
                        <td th:text="${mensaje.mensaje}">Message</td>
                        <td th:text="${mensaje.fechaEnvio != null ? mensaje.fechaEnvio : 'N/A'}">2026-01-01T10:00</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(mensajes)}">
                        <td colspan="5" class="text-center text-secondary">No messages found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
